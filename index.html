<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <main class="todo-app">
        <div class="todo-card">
            <!-- Header -->
            <header class="app-header">
                <h1 class="app-title">Todo App</h1>

                <p class="app-subtitle">Stay organized and productive.</p>
            </header>

            <!-- Add Todo -->
            <section class="add-task">
                <div class="input-group">
                    <input type="text" id="todoInput" class="form-control" placeholder="What needs to be done?">

                    <button id="addBtn" class="btn btn-primary">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </section>

            <!-- Search -->
            <section class="search-section">
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search tasks...">
                </div>
            </section>

            <!-- Filter -->
            <section class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </section>

            <!-- Todo List -->
            <section>
                <ul id="todoList" class="todo-list"></ul>
            </section>

            <!-- Empty State -->
            <section class="empty-state" id="emptyState">
                <i class="bi bi-check2-square"></i>
                <h3>No tasks Yet</h3>
                <p>Add a new task to get started.</p>
            </section>

            <!-- Footer -->
            <footer class="todo-footer">
                <div class="task-count">
                    <span id="totalTasks">0 Tasks</span>
                    <span id="completedTasks">0 Completed</span>
                </div>

                <button id="clearCompleted" class="btn btn-danger">Clear Completed</button>
            </footer>
        </div>
    </main>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Javascript -->
    <script src="js/storage.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
